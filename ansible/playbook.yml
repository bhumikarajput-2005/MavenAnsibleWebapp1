- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5022/workspace/MavenAnsibleWebapp1/target/MavenAnsibleWebapp1.war"
        dest: "/opt/tomcat/webapps/MavenAnsibleWebapp1.war"
        remote_src: no

    - name: Restart Tomcat
      systend:
        name: tomcat
        state: restarted
